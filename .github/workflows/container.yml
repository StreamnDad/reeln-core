name: Build manylinux container

on:
  push:
    paths:
      - ".github/manylinux.Dockerfile"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build and push manylinux image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .github
          file: .github/manylinux.Dockerfile
          push: true
          tags: |
            ghcr.io/streamndad/manylinux-ffmpeg:7.0.2
            ghcr.io/streamndad/manylinux-ffmpeg:latest
